<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="980" viewBox="0 0 1400 980">
  <defs>
    <style>
      .bg { fill: #f7f8fb; }
      .title { font: 700 30px Arial, sans-serif; fill: #172033; }
      .subtitle { font: 400 15px Arial, sans-serif; fill: #5a6475; }
      .section { font: 700 18px Arial, sans-serif; fill: #172033; }
      .label { font: 700 15px Arial, sans-serif; fill: #172033; }
      .small { font: 400 13px Arial, sans-serif; fill: #465266; }
      .tiny { font: 400 12px Arial, sans-serif; fill: #5d687a; }
      .box { fill: #ffffff; stroke: #c8d1df; stroke-width: 1.4; rx: 8; }
      .implemented { fill: #e9f7f0; stroke: #45a778; }
      .external { fill: #eef2ff; stroke: #6875d1; }
      .storage { fill: #fff7e6; stroke: #d89a22; }
      .runtime { fill: #f0fbff; stroke: #42a7c6; }
      .mock { fill: #fff0f0; stroke: #d35d5d; }
      .arrow { stroke: #697386; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #8a95a6; stroke-width: 2; fill: none; stroke-dasharray: 6 5; marker-end: url(#arrow); }
      .lane { fill: #ffffff; stroke: #dde4ef; stroke-width: 1; rx: 10; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#697386"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1400" height="980"/>
  <text class="title" x="50" y="52">Doctor Credential Verification AI Pipeline</text>
  <text class="subtitle" x="50" y="78">Current hackathon architecture: implemented CLI pipeline, local audio integration, external LLM APIs, local vector storage.</text>

  <rect class="lane" x="40" y="110" width="1320" height="120"/>
  <text class="section" x="60" y="142">Inputs</text>
  <rect class="box implemented" x="70" y="160" width="250" height="48"/>
  <text class="label" x="90" y="181">Doctor info.json</text>
  <text class="small" x="90" y="199">name, specialty, survey answers</text>
  <rect class="box implemented" x="360" y="160" width="250" height="48"/>
  <text class="label" x="380" y="181">Credential PDFs</text>
  <text class="small" x="380" y="199">diploma, license documents</text>
  <rect class="box implemented" x="650" y="160" width="250" height="48"/>
  <text class="label" x="670" y="181">main.py</text>
  <text class="small" x="670" y="199">CLI orchestrator</text>
  <rect class="box storage" x="940" y="160" width="360" height="48"/>
  <text class="label" x="960" y="181">.env configuration</text>
  <text class="small" x="960" y="199">API keys, db paths, folders</text>

  <path class="arrow" d="M 195 208 V 270"/>
  <path class="arrow" d="M 485 208 V 270"/>
  <path class="arrow" d="M 775 208 V 270"/>

  <rect class="lane" x="40" y="260" width="1320" height="290"/>
  <text class="section" x="60" y="292">Registration Processing Pipeline</text>

  <rect class="box implemented" x="70" y="320" width="210" height="68"/>
  <text class="label" x="90" y="343">1. PDF to Images</text>
  <text class="small" x="90" y="362">pipeline/pdf_to_images.py</text>
  <text class="tiny" x="90" y="379">outputs PNG pages</text>

  <rect class="box external" x="320" y="320" width="210" height="68"/>
  <text class="label" x="340" y="343">2. OCR</text>
  <text class="small" x="340" y="362">NVIDIA Nemotron OCR</text>
  <text class="tiny" x="340" y="379">outputs raw text</text>

  <rect class="box external" x="570" y="320" width="230" height="68"/>
  <text class="label" x="590" y="343">3. Profile Extraction</text>
  <text class="small" x="590" y="362">Vision LLM + OCR text</text>
  <text class="tiny" x="590" y="379">outputs structured profile JSON</text>

  <rect class="box external" x="840" y="320" width="210" height="68"/>
  <text class="label" x="860" y="343">4. Web Verification</text>
  <text class="small" x="860" y="362">OpenRouter Perplexity</text>
  <text class="tiny" x="860" y="379">outputs source checks</text>

  <rect class="box implemented" x="1090" y="320" width="210" height="68"/>
  <text class="label" x="1110" y="343">5. Survey Q&amp;A</text>
  <text class="small" x="1110" y="362">currently from info.json</text>
  <text class="tiny" x="1110" y="379">3 written answers</text>

  <path class="arrow" d="M 280 354 H 320"/>
  <path class="arrow" d="M 530 354 H 570"/>
  <path class="arrow" d="M 800 354 H 840"/>
  <path class="arrow" d="M 1050 354 H 1090"/>

  <rect class="box storage" x="190" y="440" width="260" height="60"/>
  <text class="label" x="210" y="463">data/images/{doctor_id}</text>
  <text class="small" x="210" y="482">rendered page PNG files</text>

  <rect class="box storage" x="520" y="440" width="260" height="60"/>
  <text class="label" x="540" y="463">data/profiles</text>
  <text class="small" x="540" y="482">profile JSON output</text>

  <rect class="box storage" x="850" y="440" width="280" height="60"/>
  <text class="label" x="870" y="463">ChromaDB ./db</text>
  <text class="small" x="870" y="482">profile, verification, survey chunks</text>

  <path class="dash" d="M 175 388 V 440"/>
  <path class="dash" d="M 685 388 V 440"/>
  <path class="dash" d="M 1195 388 C 1195 425 1040 420 1010 440"/>

  <rect class="box implemented" x="590" y="530" width="260" height="68"/>
  <text class="label" x="610" y="553">6. RAG Ingestion</text>
  <text class="small" x="610" y="572">pipeline/rag.py</text>
  <text class="tiny" x="610" y="589">embeds chunks with MiniLM</text>

  <path class="arrow" d="M 720 500 V 530"/>
  <path class="arrow" d="M 850 564 H 980 V 500"/>

  <rect class="lane" x="40" y="620" width="1320" height="220"/>
  <text class="section" x="60" y="652">Live Interview Runtime</text>

  <rect class="box runtime" x="70" y="680" width="220" height="70"/>
  <text class="label" x="90" y="704">7. Expression Stream</text>
  <text class="small" x="90" y="723">DeepFace + OpenCV webcam</text>
  <text class="tiny" x="90" y="740">per-turn emotion log</text>

  <rect class="box runtime" x="330" y="680" width="230" height="70"/>
  <text class="label" x="350" y="704">8. Interview Agent</text>
  <text class="small" x="350" y="723">pipeline/interview.py</text>
  <text class="tiny" x="350" y="740">3 LLM-generated turns</text>

  <rect class="box implemented" x="600" y="650" width="260" height="60"/>
  <text class="label" x="620" y="673">Local TTS</text>
  <text class="small" x="620" y="692">audio/tts_kokoro + Kokoro ONNX</text>

  <rect class="box implemented" x="600" y="735" width="260" height="60"/>
  <text class="label" x="620" y="758">Local STT</text>
  <text class="small" x="620" y="777">audio/stt_whisper + faster-whisper</text>

  <rect class="box external" x="900" y="680" width="210" height="70"/>
  <text class="label" x="920" y="704">Interview LLM</text>
  <text class="small" x="920" y="723">NVIDIA Llama instruct</text>
  <text class="tiny" x="920" y="740">asks follow-up questions</text>

  <rect class="box storage" x="1150" y="680" width="170" height="70"/>
  <text class="label" x="1170" y="704">transcripts/</text>
  <text class="small" x="1170" y="723">saved interview JSON</text>

  <path class="arrow" d="M 980 500 C 980 590 445 590 445 680"/>
  <path class="arrow" d="M 560 715 H 600"/>
  <path class="arrow" d="M 730 710 V 735"/>
  <path class="arrow" d="M 860 680 H 900"/>
  <path class="arrow" d="M 1110 715 H 1150"/>
  <path class="dash" d="M 180 750 C 230 795 360 795 445 750"/>

  <rect class="lane" x="40" y="865" width="1320" height="80"/>
  <text class="section" x="60" y="897">Final Decision</text>
  <rect class="box external" x="280" y="885" width="250" height="42"/>
  <text class="label" x="300" y="912">9. LLM Consistency Evaluation</text>
  <rect class="box implemented" x="570" y="885" width="250" height="42"/>
  <text class="label" x="590" y="912">Weighted Scoring Engine</text>
  <rect class="box storage" x="860" y="885" width="250" height="42"/>
  <text class="label" x="880" y="912">reports/{doctor_id}_report.json</text>
  <path class="arrow" d="M 1235 750 V 865 C 1235 905 1130 906 1110 906"/>
  <path class="arrow" d="M 530 906 H 570"/>
  <path class="arrow" d="M 820 906 H 860"/>

  <rect class="box mock" x="1160" y="520" width="170" height="68"/>
  <text class="label" x="1180" y="543">Not Built Yet</text>
  <text class="small" x="1180" y="562">FastAPI portal</text>
  <text class="small" x="1180" y="579">email/admin UI</text>

  <text class="tiny" x="60" y="965">Legend: green = implemented local code, blue = external API/service, yellow = local storage, cyan = runtime/audio/webcam, red = planned but not implemented.</text>
</svg>
